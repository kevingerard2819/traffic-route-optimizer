version: "3.9"

services:
  kafka:
    image: bitnami/kafka:3.7
    container_name: mapsml-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - ALLOW_PLAINTEXT_LISTENER=yes

  simulator:
    build:
      context: ./services/simulator
    container_name: mapsml-simulator
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - GPS_TOPIC=gps-events
      - PUBLISH_INTERVAL_SECONDS=1
    depends_on:
      - kafka

  ingestion:
    build:
      context: ./services/ingestion
    container_name: mapsml-ingestion
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - GPS_TOPIC=gps-events
      - SQLITE_PATH=/data/traffic.db
    volumes:
      - mapsml-data:/data
    depends_on:
      - kafka

  ml:
    build:
      context: ./services/ml
    container_name: mapsml-ml
    ports:
      - "7000:7000"

  api:
    build:
      context: ./services/api
    container_name: mapsml-api
    ports:
      - "8000:8000"
    environment:
      - SQLITE_PATH=/data/traffic.db
      - ML_BASE_URL=http://ml:7000
    volumes:
      - mapsml-data:/data
    depends_on:
      - ingestion
      - ml

volumes:
  mapsml-data:
